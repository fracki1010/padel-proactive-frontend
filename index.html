<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-l8-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-l8-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-l8.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#113159" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      (() => {
        const key = "padexa-theme";
        const saved = localStorage.getItem(key);
        const isDark = saved ? saved === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.classList.toggle("dark", isDark);
        document.documentElement.style.colorScheme = isDark ? "dark" : "light";
      })();
    </script>
    <meta
      title="PADEXA - Reserva automática de pistas de pádel con IA"
      name="description"
      content="PADEXA - Asegura tu Pista en un Click con nuestra IA inteligente. Reserva de turnos de pádel automatizado y gestionado."
    />
    <!-- SEO Tags -->
    <title>PADEXA | Reserva automática IA</title>
  </head>
  <body id="padexa-body-main">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
